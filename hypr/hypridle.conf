general {
    lock_cmd = hyprlock
    before_sleep_cmd = hyprlock
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Reduz brilho após 4 minutos de inatividade
listener {
    timeout = 240
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# Bloqueia após 10 minutos
listener {
    timeout = 600
    on-timeout = hyprlock
}

# Suspende após 30 minutos
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
